name: Auto Multi-Image Register

# 當你有任何檔案提交上傳時自動發動
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 複製倉庫程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝網路套件
      run: pip install requests

    - name: 執行多圖改名與 AI 辨識
      run: python run_ocr.py

    - name: 自動將改名後的圖片與 Excel 存回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "自動命名與合併登記 (${{ github.sha }})" || exit 0
        git push

